# Test Case Generation Rules - Universal Template

## Critical Thinking Requirements (MANDATORY)
- Always ask: "How does a real user encounter this issue?"
- Question: "Is this component directly user-facing or part of a larger workflow?"
- Distinguish between internal system components and user-accessible resources
- Map technical components to actual user operations and workflows
- Verify: "What user action would naturally trigger the creation/modification of affected resources?"

## Architecture Understanding (MANDATORY)

### **IMPORTANT: Data Source Selection**
⚠️ **DeepWiki Limitation**: DeepWiki MCP has approximately **1 week data lag** - may not contain latest code changes
📋 **Two Options Available**:
1. **Option A - Local Codebase (RECOMMENDED for latest changes)**:
   - Use Read, Glob, Grep tools to analyze local repository code
   - Search for component implementations, API definitions, controllers
   - Read relevant source files directly from local codebase
   - **Pros**: Latest code, immediate access, no lag
   - **Cons**: Requires manual exploration

2. **Option B - DeepWiki MCP (RECOMMENDED for general architecture)**:
   - Use DeepWiki MCP for overall system architecture understanding
   - Good for established patterns, general workflows, documentation
   - **Pros**: Structured knowledge, comprehensive analysis
   - **Cons**: ~1 week data lag, may miss recent changes

### **Recommended Strategy**:
- **Start with DeepWiki** for general component architecture and patterns
- **Supplement with Local Codebase** for specific implementation details
- **Always verify critical details** against local code when JIRA issue is recent

### **Core Architecture Analysis**:
- Understand component's role in the overall system
- Identify the complete end-to-end flow that would expose the reported issue
- Determine if testing should focus on user workflows vs. direct resource manipulation
- Understand component dependencies and integration points

