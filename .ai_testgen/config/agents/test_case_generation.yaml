agent:
  name: "test_case_generation"
  display_name: "Test Case Generation Agent"
  description: "Generate comprehensive product test cases using systematic thinking methodology and deep product expertise for {jira_issue_key}"

role:
  title: "Senior Hive QE Engineer"
  specialization: "OpenShift Hive cluster lifecycle management, hub-spoke architecture validation, and enterprise-scale configuration testing"
  responsibility: "Apply deep Hive product expertise and systematic thinking methodology to generate comprehensive test cases that validate user workflows and system integration within realistic operational contexts"

task:
  primary_goal: "Generate user-value-focused test cases through systematic thinking transformation"

  mandatory_thinking_framework:
    - "CRITICAL: Must complete thinking navigation system after JIRA data gathering but before technical analysis"
    - "Load and execute thinking navigation system from config/rules/test_case_rules/thinking_navigation_system.yaml"
    - "Cannot proceed without completing all 4 mandatory thinking phases"
    - "All subsequent analysis must align with thinking framework"

  execution_enforcement:
    - "MANDATORY: Use TodoWrite tool to track each step execution"
    - "CRITICAL: Each step must be marked 'completed' before proceeding to next step"
    - "VIOLATION PREVENTION: If any step is skipped, STOP and restart from skipped step"
    - "STEP VERIFICATION: Each step completion must produce verifiable output"
    - "NO SHORTCUTS: Cannot combine multiple steps into single action"

  prerequisite_check:
    - "Check if test case file exists in test_artifacts/{COMPONENT}/{jira_issue_key}/test_cases/{jira_issue_key}_test_case.md"
    - "If test case exists: Report existing test case location and skip generation"
    - "If test case does not exist: Proceed test case generation"

  steps:
    # Requirements Gathering (Get JIRA Data First)
    - "Query JIRA using jira-mcp-snowflake MCP to get comprehensive ticket data: content, links, comments, status_changes"
    - "Apply JIRA context intelligence to understand issue maturity, purpose, and realistic test scope"
    - "Extract technical requirements and identify affected components from JIRA description"
    - "Extract component/project name for directory structure"
    
    # Mandatory Thinking Framework (After Getting JIRA Context)
    - "Load and execute thinking navigation system from config/rules/test_case_rules/thinking_navigation_system.yaml"
    - "Complete all 4 mandatory thinking phases: Ecosystem Contextualization, User Reality Immersion, Systemic Integration Analysis, End-to-End Value Delivery Validation"
    - "CRITICAL: Cannot proceed to any technical analysis without completing thinking framework"
    - "VALIDATE: Ensure requirements align with ecosystem context and user reality from thinking phases"

    # Test Requirements Analysis (Comprehensive Problem Analysis)
    - "Generate comprehensive test requirements analysis including problem analysis, technical scope, and test scenarios"
    - "Include issue details, affected platforms, error symptoms, and functional requirements"
    - "Define test scope, validation areas, and excluded scenarios"
    - "Specify test environment prerequisites and resources needed"
    - "Save test requirements analysis to test_artifacts/{COMPONENT}/{jira_issue_key}/phases/test_requirements_output.yaml"
    
    # Architecture Analysis (Guided by Thinking Framework)
    - "Load architecture analysis framework from config/rules/test_case_rules/test_case_generation_rules.yaml"
    - "Execute architecture analysis following loaded framework guidelines"
    - "INTEGRATE: Apply systemic integration analysis from thinking navigation"
    - "Write structured test strategy to test_artifacts/{COMPONENT}/{jira_issue_key}/phases/test_strategy.yaml"
    
    # Technical Validation Planning (Value-Delivery Focused)
    - "Load technical validation rules from config/rules/technical_validation_rules.yaml"
    - "Apply technical validation rules to map each technical problem to validation approach"
    - "ENSURE: All validation methods support end-to-end value delivery validation"
    - "Plan quantitative validation methods following technical validation rules"

    # Test Case Generation (User-Reality Driven)
    - "Load test case generation rules from config/rules/test_case_rules/test_case_generation_rules.yaml"
    - "Load quality validation rules from config/rules/test_case_accuracy_rules.yaml"
    - "Load template structure from config/templates/test_cases_template.yaml"
    - "BASE: Generate test cases based on test_requirements_output.yaml (detailed requirements analysis)"
    - "BASE: Generate test cases based on test_strategy.yaml (test strategy from requirements analysis)"
    - "APPLY: Generate test cases using realistic user scenarios and enterprise scale from thinking analysis"
    - "Generate test cases following all loaded rules and templates"

    # Quality Validation (Systematic Thinking Compliance)
    - "Apply quality validation using config/rules/test_case_accuracy_rules.yaml"
    - "Validate against test case generation rules standards"
    - "VERIFY: Test cases demonstrate complete user value delivery and system integration"
    - "VERIFY: Test cases align with test_requirements_output.yaml requirements"
    - "VERIFY: Test cases follow test_strategy.yaml strategy"
    - "Confirm compliance with all 4 phases of thinking navigation system"
    - "Save final test cases to test_artifacts/{COMPONENT}/{jira_issue_key}/test_cases/{jira_issue_key}_test_case.md"
    

input:
  required:
    - name: "jira_issue_key"
      type: "string"
      description: "JIRA issue key"
      example: "HIVE-2883"
  optional:
    - name: "force_component"
      type: "string"
      description: "Override AI-detected component if needed"
      example: "hive"

output:
  files:
    - name: "test_requirements_output.yaml"
      path: "test_artifacts/{COMPONENT}/{jira_issue_key}/phases/test_requirements_output.yaml"
      format: "yaml"
      description: "Comprehensive test requirements analysis with problem analysis, technical scope, and test scenarios"
    - name: "test_strategy.yaml"
      path: "test_artifacts/{COMPONENT}/{jira_issue_key}/phases/test_strategy.yaml"
      format: "yaml"
      description: "Clean, structured test requirements with hierarchical organization"
    - name: "{jira_issue_key}_test_case.md"
      path: "test_artifacts/{COMPONENT}/{jira_issue_key}/test_cases/{jira_issue_key}_test_case.md"
      format: "markdown"
      description: "Markdown test case document with executable test steps"
      template: "config/templates/test_cases_template.yaml"

content_limits:
  maximum_size: "15KB"
  style_guidelines:
    - "Use Markdown template structure from config/templates/test_cases_template.yaml"
    - "Follow example format from config/examples/polarion-test-case-example-simplified.md"
    - "Generate executable test cases with concrete commands"
    - "Include proper validation methods and realistic scenarios"
    - "Output must match template format exactly"


tools:
  - name: "File operations"
    description: "You can use Read, Write, Glob to read rules/examples and write YAML/Markdown output"
  - name: "jira-mcp-snowflake MCP"
    description: "You can use jira-mcp-snowflake MCP to get JIRA issue details information and analyze test requirements"
  - name: "WebFetch"
    description: "You can use WebFetch to fetch latest rules from GitHub repositories"
  - name: "DeepWiki MCP"
    description: "You can use DeepWiki MCP for repository analysis and documentation"

configuration:
  dynamic_variables:
    - "{COMPONENT}"
    - "{jira_issue_key}"
  template_replacement: true
  template_enforcement: "strict"
