agent:
  name: "e2e_test_generation_openshift_private"
  display_name: "Tests Private E2E Generator"
  description: "Generate E2E test code in openshift-tests-private repository based on generated test cases. Transforms test case scenarios into executable E2E test logic."

role:
  title: "OpenShift QE"
  focus: "Integration testing and end-to-end workflows"

execution_principles:
  branch_management: "CRITICAL: Always work on ai-e2e-{JIRA_KEY} branch, NEVER on master"
  step_validation: "MANDATORY: Verify branch before and after each major step"
  error_prevention: "If accidentally on master branch, immediately switch to ai-e2e-{JIRA_KEY}"

task:
  primary_goal: "Transform generated test cases into executable E2E tests in openshift-tests-private repository"
  prerequisite_check:
    - "Check if test case already exists in openshift-tests-private repository for {JIRA_KEY}"
    - "If test case exists: Report existing test case location and validate against requirements"
    - "If existing test case meets requirements: skip generation and report compliance"
    - "If existing test case does not meet requirements: proceed with enhancement or regeneration"
    - "If test case does not exist: Proceed with test case generation"

  subtasks:
    - name: "Prepare Repository for Adding Test Cases"
      timeout: "40s"
      input_requirements: ["jira_issue_key", "requirements_input"]
      steps:
        - "Check if temp_repos/openshift-tests-private exists"
        - "If not: Clone your fork: gh repo clone YOUR_USERNAME/openshift-tests-private temp_repos/openshift-tests-private"
        - "cd temp_repos/openshift-tests-private"
        - "Check if upstream remote exists: git remote -v | grep upstream"
        - "If not exists: git remote add upstream https://github.com/openshift/openshift-tests-private.git"
        - "git checkout master"
        - "MANDATORY: Sync fork master with upstream master using GitHub CLI: gh repo sync huangmingxia/openshift-tests-private --branch master"
        - "git pull origin master"
        - "Create branch ai-e2e-{JIRA_KEY} for test case generation/modification"
        - "git checkout -b ai-e2e-{JIRA_KEY}"
        - "MANDATORY: Verify current branch is ai-e2e-{JIRA_KEY} using 'git branch'"
        - "MANDATORY: Ensure working directory is clean using 'git status'"
      success_criteria:
        - "openshift-tests-private repository exists and fork master is updated with latest upstream code"
        - "Branch ai-e2e-{JIRA_KEY} created from latest fork master and ready for adding test cases"
        - "Repository working directory is clean"
        - "Current branch verified to be ai-e2e-{JIRA_KEY}"
        - "Ready to proceed with test case generation or modification based on prerequisite check results"
    - name: "Integration E2E Test Generation"
      timeout: "120s"
      input_requirements: ["requirements_input", "test_case_input", "jira_issue_key"]
      steps:
        - "MANDATORY: Verify current branch is ai-e2e-{JIRA_KEY} before starting (use 'git branch' command)"
        - "Load and apply E2E generation rules from local directory: config/rules/e2e_rules/e2e_test_case_guidelines_test_private.md"
        - "Read and analyze the generated test case from test_case_input file"
        - "Extract specific test scenarios and validation points from the test case"
        - "Analyze existing E2E tests in openshift-tests-private to learn test structure and how test cases are organized"
        - "Generate E2E test code based on the test case scenarios and requirements"
        - "Transform test case steps into executable E2E test logic following openshift-tests-private patterns"
        - "CRITICAL: Ensure test steps are concise and clear - eliminate redundant validation steps"
        - "Convert {JIRA_KEY} to lowercase and remove symbols for testCaseID (e.g., HIVE-2883 becomes hive2883)"
        - "Write test file in test/extended/cluster_operator/{COMPONENT}/ following Ginkgo structure"
        - "Use converted testCaseID for all resource naming to ensure RFC 1123 compliance"
        - "Add AI authorship information: '// Auto-generated by AI Test Generation Assistant (OpenShift Private)' and '// JIRA: {JIRA_KEY}'"
        - "Include appropriate test selectors and metadata"
        - "MANDATORY: Verify still on ai-e2e-{JIRA_KEY} branch after code generation (use 'git branch' command)"
      success_criteria:
        - "E2E test code generated based on the test case scenarios and requirements"
        - "Integration E2E test file created in openshift-tests-private"
        - "Test logic accurately reflects the test case validation points"
        - "Test steps are concise and clear"
        - "MANDATORY: All work done on ai-e2e-{JIRA_KEY} branch, not master"

    - name: "OpenShift Private Validation and Quality Check"
      timeout: "60s"
      input_requirements: ["jira_issue_key"]
      steps:
        - "MANDATORY: Verify current branch is ai-e2e-{JIRA_KEY} before validation (use 'git branch' command)"
        - "Run 'make all' to validate compilation and formatting"
        - "Check compilation output for errors (syntax, imports, formatting)"
        - "If compilation errors detected, attempt to fix common issues and re-run"
        - "MANDATORY: Confirm still on ai-e2e-{JIRA_KEY} branch after validation (use 'git branch' command)"
      success_criteria:
        - "Compilation successful with make all"
        - "MANDATORY: All validation work done on ai-e2e-{JIRA_KEY} branch, not master"
        - "Integration E2E test file created in openshift-tests-private"
        - "Test logic focuses on end-to-end workflows"
        - "Test steps are concise and clear"

input:
  required:
    - name: "jira_issue_key"
      type: "string"
      description: "JIRA issue key"
      example: "HIVE-2883"
    - name: "requirements_input"
      type: "file"
      description: "Test requirements"
      path: "test_artifacts/{COMPONENT}/{JIRA_KEY}/phases/test_requirements_output.yaml"
    - name: "test_case_input"
      type: "file"
      description: "Test case scenarios for integration E2E analysis"
      path: "test_artifacts/{COMPONENT}/{JIRA_KEY}/test_cases/{JIRA_KEY}_test_case.md"

output:
  files:
    - name: "{JIRA_KEY}_openshift_private_e2e_results.md"
      path: "test_artifacts/{COMPONENT}/{JIRA_KEY}/phases/{JIRA_KEY}_openshift_private_e2e_results.md"
      format: "markdown"
      description: "OpenShift Tests Private E2E test generation results and repository integration status"
      template: "config/templates/openshift_private_e2e_results_template.md"

tools:
  - name: "Git operations"
    description: "openshift-tests-private repository cloning, branching, and management"
    operations: ["git clone", "git checkout", "git merge", "git push"]
  - name: "File operations"
    description: "Read inputs, write integration E2E test files, and result documentation"
    operations: ["Read", "Write", "Glob", "Edit"]
  - name: "Build validation"
    description: "Run openshift-tests-private validation commands"
    operations: ["make all", "make verify"]
    
requires_mcp_tools: ["WebFetch", "Terminal"]

configuration:
  dynamic_variables:
    - "{COMPONENT}"
    - "{JIRA_KEY}"
  repository_management: true
  validation_required: true
  template_replacement: true
  repository_type: "openshift_tests_private"
  